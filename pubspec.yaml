name: aorandra
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

# -------------------------
# DEPENDENCIES
# -------------------------
dependencies:
  flutter:
    sdk: flutter

  get: ^4.6.6
  get_storage: ^2.1.1
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.3.1

  # Supabase
  supabase_flutter: ^2.5.6

  share_plus: ^7.2.1

  http: ^1.2.0

  # UI
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6

  url_launcher: ^6.2.5

  # Media
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  video_player: ^2.8.1
  audioplayers: ^5.2.1
  path_provider: ^2.1.2

  # State Management
  provider: ^6.1.1

  # Utils
  path: ^1.8.3

# -------------------------
# DEV DEPENDENCIES
# -------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# -------------------------
# FLUTTER CONFIG
# -------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/videos/test.mp4

  fonts:
    - family: PacificoFont
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf

# -------------------------
# APP ICON CONFIG
# -------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ico.png"